services:
  - type: web
    name: gestion-clinique-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn clinic_backend.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-clinique-db
          property: connectionString
    plans:
      - type: database
        name: gestion-clinique-db
        plan: free
        databaseName: gestioncliniquedb
